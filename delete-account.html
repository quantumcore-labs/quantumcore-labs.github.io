<!DOCTYPE html>

<head>

        input { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: white; transition: 0.3s;}
        input:focus { border-color: #ef4444; outline: none; }

    <div class="container">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Secret Message 🤫</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .card { background-color: #1e293b; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); max-width: 350px; width: 90%; border: 1px solid #334155; }
        .icon { font-size: 60px; margin-bottom: 10px; animation: bounce 2s infinite; }
        h2 { margin: 10px 0; color: #f8fafc; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .download-btn { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; text-decoration: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; display: block; box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} 60% {transform: translateY(-7px);} }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🤫</div>
        <h2>Send a Secret Message</h2>
        <p id="status-text">Opening App... If it doesn't open automatically, download it below.</p>
        
        <a href="https://github.com/quantumcore-labs/quantumcore-labs.github.io/releases/download/v1.0.0/FlirtApp.apk" class="download-btn">📲 Download App to Send</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if(userId) {
            // Android ko bolenge seedha apna custom app kholo (No Play Store Bypass needed)
            var appUrl = "secretchat://open?id=" + userId;
            
            // Website khulte hi automatically App kholne ki koshish karegi
            setTimeout(function() {
                window.location.href = appUrl;
            }, 500); 
        }
    </script>

</body>
</html>
